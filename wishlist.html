<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist — ShopMKT</title>
  <link rel="stylesheet" href="../css/global.css">
</head>
<body>
<div id="nav-root"></div>

<div class="container" style="margin:40px auto 80px">
  <div class="section-header">
    <h1 class="section-title">❤️ My Wishlist</h1>
    <button class="btn btn-ghost btn-sm" id="clear-wishlist">Clear All</button>
  </div>

  <div id="wishlist-content" class="grid-4">
    <!-- filled by JS -->
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { buildNavbar, addToCart, cartFlyAnimation, formatPrice, toast, updateNavUI, updateCartBadge } from '../js/app.js';

document.getElementById('nav-root').innerHTML = buildNavbar();
updateNavUI(); updateCartBadge();

function render() {
  const wishlist = JSON.parse(localStorage.getItem('shopmkt_wishlist') || '[]');
  const el = document.getElementById('wishlist-content');

  if (!wishlist.length) {
    el.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 24px">
      <div style="font-size:4rem;margin-bottom:16px">❤️</div>
      <h3 style="margin-bottom:10px">Your wishlist is empty</h3>
      <p style="color:var(--text-muted);margin-bottom:24px">Save items you love while you browse.</p>
      <a href="../index.html" class="btn btn-primary btn-lg">Start Browsing</a>
    </div>`;
    return;
  }

  el.innerHTML = wishlist.map(p => `
    <div class="product-card">
      <div class="product-card-img">
        <img src="${p.image}" alt="${p.name}" loading="lazy">
        <div class="product-card-actions">
          <button class="btn btn-primary btn-sm atc-btn" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}" data-image="${p.image}" data-seller="${p.seller||''}" style="flex:1">🛒 Add to Cart</button>
          <button class="btn btn-ghost btn-sm rm-btn" data-id="${p.id}">🗑️</button>
        </div>
      </div>
      <div class="product-card-info">
        <a href="product.html?id=${p.id}" class="product-name">${p.name}</a>
        <div class="product-seller">by ${p.seller || 'Verified Seller'}</div>
        <div class="product-price"><span class="product-price-main">${formatPrice(p.price)}</span></div>
      </div>
    </div>`).join('');

  document.querySelectorAll('.atc-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      addToCart({ id: btn.dataset.id, name: btn.dataset.name, price: parseFloat(btn.dataset.price), image: btn.dataset.image, seller: btn.dataset.seller });
      toast('Added to Cart! 🛒', btn.dataset.name, 'success');
      const img = btn.closest('.product-card').querySelector('img');
      cartFlyAnimation(img, document.getElementById('cart-badge'));
      updateCartBadge();
    });
  });

  document.querySelectorAll('.rm-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const updated = wishlist.filter(p => p.id !== id);
      localStorage.setItem('shopmkt_wishlist', JSON.stringify(updated));
      toast('Removed from Wishlist', '', 'info');
      render();
    });
  });
}

document.getElementById('clear-wishlist').addEventListener('click', () => {
  if (confirm('Clear your entire wishlist?')) {
    localStorage.removeItem('shopmkt_wishlist');
    render();
  }
});

render();
</script>
</body>
</html>
