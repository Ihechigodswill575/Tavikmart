<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Products — ShopMKT</title>
  <link rel="stylesheet" href="../css/global.css">
  <style>
    .search-layout { display: grid; grid-template-columns: 260px 1fr; gap: 28px; margin: 30px 0 80px; }
    .filters-sidebar { position: sticky; top: 80px; height: fit-content; }
    .filter-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }
    .filter-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 16px; display: flex; justify-content: space-between; }
    .filter-group { margin-bottom: 24px; }
    .filter-group-title { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .filter-check { display: flex; align-items: center; gap: 8px; font-size: 0.875rem; color: var(--text-muted); cursor: pointer; padding: 4px 0; transition: color 0.2s; }
    .filter-check:hover { color: var(--text); }
    .filter-check input { accent-color: var(--primary); }
    .price-range { display: flex; flex-direction: column; gap: 10px; }
    .price-inputs { display: flex; gap: 8px; align-items: center; }
    .price-inputs input { flex: 1; }
    .price-slider { width: 100%; accent-color: var(--primary); }

    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .results-count { font-size: 0.875rem; color: var(--text-muted); }
    .sort-select { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 14px; color: var(--text); font-size: 0.875rem; cursor: pointer; }

    .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }

    .no-results { text-align: center; padding: 80px 24px; }
    .no-results .nr-icon { font-size: 3.5rem; margin-bottom: 14px; }

    @media (max-width: 1024px) { .products-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 768px) { .search-layout { grid-template-columns: 1fr; } .filters-sidebar { position: static; } }
  </style>
</head>
<body>
<div id="nav-root"></div>

<div class="container">
  <div style="margin:24px 0 0;font-size:0.875rem;color:var(--text-muted)">
    <a href="../index.html" style="color:var(--primary)">Home</a> › Search
  </div>

  <!-- Search Bar (large) -->
  <div style="margin:20px 0;display:flex;gap:10px">
    <div style="flex:1;position:relative">
      <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1.1rem">🔍</span>
      <input type="text" id="search-bar" class="form-input" placeholder="Search products…" style="padding-left:48px;height:52px;font-size:1rem">
    </div>
    <button class="btn btn-primary btn-lg" id="search-btn">Search</button>
  </div>

  <!-- Category Chips -->
  <div class="category-chips" id="cat-chips" style="margin-bottom:24px">
    <div class="chip active" data-cat="">All</div>
    <div class="chip" data-cat="electronics">📱 Electronics</div>
    <div class="chip" data-cat="fashion">👗 Fashion</div>
    <div class="chip" data-cat="home">🏠 Home & Living</div>
    <div class="chip" data-cat="beauty">💄 Beauty</div>
    <div class="chip" data-cat="sports">⚽ Sports</div>
    <div class="chip" data-cat="food">🍎 Food</div>
    <div class="chip" data-cat="auto">🚗 Auto</div>
    <div class="chip" data-cat="books">📚 Books</div>
  </div>

  <div class="search-layout">
    <!-- Sidebar Filters -->
    <div class="filters-sidebar">
      <div class="filter-card">
        <div class="filter-title">
          Filters
          <button id="clear-filters" class="btn btn-ghost btn-sm">Clear</button>
        </div>

        <div class="filter-group">
          <div class="filter-group-title">Price Range</div>
          <div class="price-range">
            <input type="range" class="price-slider" id="price-slider" min="0" max="1000000" step="5000" value="1000000">
            <div style="display:flex;justify-content:space-between;font-size:0.8rem;color:var(--text-muted)">
              <span>₦0</span><span id="price-max-label">₦1,000,000+</span>
            </div>
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-group-title">Category</div>
          <div style="display:flex;flex-direction:column;gap:2px">
            <label class="filter-check"><input type="checkbox" value="electronics"> Electronics</label>
            <label class="filter-check"><input type="checkbox" value="fashion"> Fashion</label>
            <label class="filter-check"><input type="checkbox" value="home"> Home & Living</label>
            <label class="filter-check"><input type="checkbox" value="beauty"> Beauty</label>
            <label class="filter-check"><input type="checkbox" value="sports"> Sports</label>
            <label class="filter-check"><input type="checkbox" value="food"> Food & Drinks</label>
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-group-title">Rating</div>
          <div style="display:flex;flex-direction:column;gap:2px">
            <label class="filter-check"><input type="radio" name="rating" value="4"> ⭐⭐⭐⭐ & up</label>
            <label class="filter-check"><input type="radio" name="rating" value="3"> ⭐⭐⭐ & up</label>
            <label class="filter-check"><input type="radio" name="rating" value="0" checked> Any</label>
          </div>
        </div>

        <button class="btn btn-primary btn-full" id="apply-filters">Apply Filters</button>
      </div>
    </div>

    <!-- Results -->
    <div>
      <div class="results-header">
        <span class="results-count" id="results-count">Loading…</span>
        <select class="sort-select" id="sort-select">
          <option value="latest">Latest</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="popular">Most Popular</option>
        </select>
      </div>

      <div class="products-grid" id="search-results">
        <!-- JS filled -->
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { buildNavbar, getProducts, addToCart, cartFlyAnimation, formatPrice, toast, updateNavUI, updateCartBadge } from '../js/app.js';

document.getElementById('nav-root').innerHTML = buildNavbar();
updateNavUI(); updateCartBadge();

const params = new URLSearchParams(window.location.search);
const queryParam = params.get('q') || '';
const catParam = params.get('cat') || '';

if (queryParam) document.getElementById('search-bar').value = queryParam;

// Demo products
const DEMO = [
  { id:'d1', name:'iPhone 15 Pro Max 256GB', price:850000, oldPrice:950000, category:'electronics', seller:'TechHub NG', image:'https://images.unsplash.com/photo-1695048133142-1a20484d2569?w=400&q=80', badge:'sale' },
  { id:'d2', name:'Air Max 270 Sneakers', price:45000, oldPrice:60000, category:'fashion', seller:'KickZone', image:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&q=80', badge:'sale' },
  { id:'d3', name:'Dell XPS 15 Laptop', price:750000, category:'electronics', seller:'GadgetWorld', image:'https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=400&q=80', badge:'new' },
  { id:'d4', name:'Luxury Perfume Set', price:28000, category:'beauty', seller:'GlowStore', image:'https://images.unsplash.com/photo-1541643600914-78b084683702?w=400&q=80' },
  { id:'d5', name:'Smart Watch Pro', price:65000, oldPrice:80000, category:'electronics', seller:'TechHub NG', image:'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&q=80', badge:'sale' },
  { id:'d6', name:'Women\'s Ankara Dress', price:15000, category:'fashion', seller:'AfroStyle', image:'https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=400&q=80', badge:'new' },
  { id:'d7', name:'JBL Flip 6 Speaker', price:35000, oldPrice:42000, category:'electronics', seller:'SoundCity', image:'https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=400&q=80' },
  { id:'d8', name:'Indoor Plant Set (3)', price:8500, category:'home', seller:'GreenThumb', image:'https://images.unsplash.com/photo-1545241047-6083a3684587?w=400&q=80', badge:'new' },
  { id:'d9', name:'Running Shoes Nike', price:38000, category:'sports', seller:'SportZone', image:'https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=400&q=80' },
  { id:'d10', name:'Blender Pro 1500W', price:22000, category:'home', seller:'HomeGoods', image:'https://images.unsplash.com/photo-1570222094114-d054a817e56b?w=400&q=80' },
  { id:'d11', name:'Vitamin C Serum', price:7500, category:'beauty', seller:'GlowStore', image:'https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=400&q=80', badge:'new' },
  { id:'d12', name:'Men\'s Agbada Set', price:35000, category:'fashion', seller:'AfroStyle', image:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&q=80' },
];

let allProds = [...DEMO];
let displayed = [...DEMO];

async function load() {
  try {
    const filters = {};
    if (catParam) filters.category = catParam;
    const fromDb = await getProducts({ ...filters, limit: 50 });
    if (fromDb.length > 0) allProds = fromDb;
  } catch(e) { console.log('Using demo products'); }

  // Active chip
  if (catParam) {
    document.querySelectorAll('#cat-chips .chip').forEach(c => {
      c.classList.toggle('active', c.dataset.cat === catParam);
    });
  }

  applySearch();
}

function applySearch() {
  const q = document.getElementById('search-bar').value.toLowerCase().trim();
  const maxPrice = parseInt(document.getElementById('price-slider').value);
  const checkedCats = [...document.querySelectorAll('.filter-check input[type=checkbox]:checked')].map(i => i.value);
  const activeChip = document.querySelector('#cat-chips .chip.active')?.dataset.cat || '';
  const sort = document.getElementById('sort-select').value;

  let filtered = allProds.filter(p => {
    if (q && !p.name.toLowerCase().includes(q) && !p.category?.toLowerCase().includes(q)) return false;
    if (p.price > maxPrice) return false;
    if (checkedCats.length > 0 && !checkedCats.includes(p.category)) return false;
    if (activeChip && p.category !== activeChip) return false;
    return true;
  });

  if (sort === 'price-asc') filtered.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') filtered.sort((a,b) => b.price - a.price);

  displayed = filtered;
  renderResults();
}

function renderResults() {
  const grid = document.getElementById('search-results');
  document.getElementById('results-count').textContent = `${displayed.length} product${displayed.length !== 1 ? 's' : ''} found`;

  if (displayed.length === 0) {
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1">
      <div class="nr-icon">🔍</div>
      <h3>No products found</h3>
      <p style="color:var(--text-muted)">Try different keywords or remove filters.</p>
    </div>`;
    return;
  }

  grid.innerHTML = displayed.map(p => {
    const img = p.image || p.imageUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=252535&color=F5A623&size=400`;
    const badge = p.badge ? `<div class="product-badge ${p.badge}">${p.badge==='new'?'NEW':'SALE'}</div>` : '';
    const oldPrice = p.oldPrice ? `<span class="product-price-old">${formatPrice(p.oldPrice)}</span>` : '';
    return `
      <div class="product-card" data-id="${p.id}">
        <div class="product-card-img">
          ${badge}
          <img src="${img}" alt="${p.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x300/252535/F5A623?text=Product'">
          <div class="product-card-actions">
            <button class="btn btn-primary btn-sm atc-btn" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}" data-image="${img}" data-seller="${p.seller||''}" style="flex:1">🛒 Add to Cart</button>
            <a href="product.html?id=${p.id}" class="btn btn-ghost btn-sm">👁️</a>
          </div>
        </div>
        <div class="product-card-info">
          <a href="product.html?id=${p.id}" class="product-name">${p.name}</a>
          <div class="product-seller">by ${p.seller || 'Verified Seller'}</div>
          <div class="product-price">
            <span class="product-price-main">${formatPrice(p.price)}</span> ${oldPrice}
          </div>
        </div>
      </div>`;
  }).join('');

  // ATC events
  document.querySelectorAll('.atc-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      const product = { id: btn.dataset.id, name: btn.dataset.name, price: parseFloat(btn.dataset.price), image: btn.dataset.image, seller: btn.dataset.seller };
      addToCart(product);
      toast('Added to Cart! 🛒', product.name, 'success');
      const img = btn.closest('.product-card').querySelector('img');
      cartFlyAnimation(img, document.getElementById('cart-badge'));
      updateCartBadge();
    });
  });
}

// Events
document.getElementById('search-btn').addEventListener('click', applySearch);
document.getElementById('search-bar').addEventListener('keydown', e => { if (e.key === 'Enter') applySearch(); });
document.getElementById('apply-filters').addEventListener('click', applySearch);
document.getElementById('sort-select').addEventListener('change', applySearch);
document.getElementById('price-slider').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  document.getElementById('price-max-label').textContent = v >= 1000000 ? '₦1,000,000+' : formatPrice(v);
});

document.getElementById('clear-filters').addEventListener('click', () => {
  document.getElementById('price-slider').value = 1000000;
  document.getElementById('price-max-label').textContent = '₦1,000,000+';
  document.querySelectorAll('.filter-check input').forEach(i => { i.checked = false; });
  document.querySelector('input[name=rating][value="0"]').checked = true;
  applySearch();
});

document.querySelectorAll('#cat-chips .chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('#cat-chips .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    applySearch();
  });
});

load();
</script>
</body>
</html>
