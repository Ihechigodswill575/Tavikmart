<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Categories — ShopMKT</title>
  <link rel="stylesheet" href="../css/global.css">
</head>
<body>
<div id="nav-root"></div>

<div class="container" style="margin:40px auto 80px">
  <div class="section-header">
    <h1 class="section-title">Browse Categories</h1>
  </div>

  <div id="cat-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px">
    <!-- filled by JS -->
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { buildNavbar, getCategories, getProducts, formatPrice, updateNavUI, updateCartBadge } from '../js/app.js';

document.getElementById('nav-root').innerHTML = buildNavbar();
updateNavUI(); updateCartBadge();

const DEFAULT_CATS = [
  { id: 'electronics', name: 'Electronics', icon: '📱', desc: 'Phones, Laptops, TVs, Accessories' },
  { id: 'fashion', name: 'Fashion & Apparel', icon: '👗', desc: 'Clothes, Shoes, Bags, Accessories' },
  { id: 'home', name: 'Home & Living', icon: '🏠', desc: 'Furniture, Decor, Appliances, Bedding' },
  { id: 'beauty', name: 'Beauty & Care', icon: '💄', desc: 'Skincare, Makeup, Hair, Fragrances' },
  { id: 'sports', name: 'Sports & Outdoors', icon: '⚽', desc: 'Equipment, Gear, Clothing, Fitness' },
  { id: 'food', name: 'Food & Drinks', icon: '🍎', desc: 'Groceries, Snacks, Beverages' },
  { id: 'auto', name: 'Auto & Motors', icon: '🚗', desc: 'Parts, Accessories, Care, Tools' },
  { id: 'books', name: 'Books & Learning', icon: '📚', desc: 'Books, Stationery, Educational' },
];

async function load() {
  let cats;
  try { cats = await getCategories(); } catch(e) { cats = DEFAULT_CATS; }

  const grid = document.getElementById('cat-grid');
  grid.innerHTML = cats.map(c => `
    <a href="search.html?cat=${c.id}" style="
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-decoration: none;
      transition: all 0.25s;
      cursor: pointer;
    " onmouseover="this.style.borderColor='var(--primary)';this.style.transform='translateY(-4px)';this.style.boxShadow='0 0 30px rgba(245,166,35,0.15)'"
       onmouseout="this.style.borderColor='';this.style.transform='';this.style.boxShadow=''">
      <div style="font-size:3rem">${c.icon}</div>
      <div>
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;color:var(--text);margin-bottom:4px">${c.name}</div>
        <div style="font-size:0.82rem;color:var(--text-muted)">${c.desc || 'Browse all products'}</div>
      </div>
      <div style="font-size:0.82rem;color:var(--primary);font-weight:600;margin-top:auto">Browse →</div>
    </a>
  `).join('');
}

load();
</script>
</body>
</html>
