<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart — ShopMKT</title>
  <link rel="stylesheet" href="../css/global.css">
  <style>
    .cart-layout { display: grid; grid-template-columns: 1fr 360px; gap: 28px; margin: 40px 0; }
    .cart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .cart-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .cart-header h2 { font-size: 1.2rem; }
    .cart-item { display: flex; gap: 16px; padding: 18px 24px; border-bottom: 1px solid var(--border); transition: var(--transition); }
    .cart-item:last-child { border-bottom: none; }
    .cart-item:hover { background: var(--surface-2); }
    .cart-item-img { width: 80px; height: 80px; border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0; background: var(--surface-2); }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 500; margin-bottom: 4px; font-size: 0.95rem; }
    .cart-item-seller { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 10px; }
    .cart-item-row { display: flex; align-items: center; justify-content: space-between; }
    .cart-item-price { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--primary); }
    .qty-control { display: flex; align-items: center; gap: 0; background: var(--surface-3); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .qty-btn { width: 34px; height: 34px; background: none; border: none; color: var(--text); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .qty-btn:hover { background: var(--primary); color: var(--dark); }
    .qty-num { width: 36px; text-align: center; font-weight: 600; font-size: 0.9rem; border: none; background: none; color: var(--text); }
    .cart-item-remove { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1rem; padding: 4px; transition: color 0.2s; border-radius: 4px; }
    .cart-item-remove:hover { color: var(--danger); background: rgba(231,76,60,0.1); }

    /* Summary */
    .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; position: sticky; top: 80px; }
    .summary-title { font-size: 1.2rem; margin-bottom: 20px; }
    .summary-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 12px; color: var(--text-muted); }
    .summary-row.total { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); border-top: 1px solid var(--border); padding-top: 14px; margin-top: 6px; }
    .summary-row.total span:last-child { color: var(--primary); }

    .promo-row { display: flex; gap: 8px; margin: 16px 0; }
    .promo-row input { flex: 1; }
    .zone-select { margin: 10px 0 16px; }

    .empty-cart { text-align: center; padding: 80px 24px; }
    .empty-cart .ec-icon { font-size: 4rem; margin-bottom: 16px; }
    .empty-cart h3 { margin-bottom: 10px; }
    .empty-cart p { color: var(--text-muted); margin-bottom: 24px; }

    @media (max-width: 900px) { .cart-layout { grid-template-columns: 1fr; } .summary-card { position: static; } }
  </style>
</head>
<body>
<div id="nav-root"></div>

<div class="container">
  <div style="margin: 30px 0 20px; font-size: 0.875rem; color: var(--text-muted)">
    <a href="../index.html" style="color:var(--primary)">Home</a> › Shopping Cart
  </div>

  <div id="cart-content">
    <!-- filled by JS -->
  </div>
</div>

<div id="footer-root"></div>
<div id="toast-container"></div>

<script type="module">
import { buildNavbar, getCart, removeFromCart, updateCartQty, clearCart, getCartTotal, formatPrice, toast, updateNavUI, updateCartBadge } from '../js/app.js';

document.getElementById('nav-root').innerHTML = buildNavbar();
updateNavUI(); updateCartBadge();
document.getElementById('footer-root').innerHTML = buildSimpleFooter();

function renderCart() {
  const cart = getCart();
  const container = document.getElementById('cart-content');
  if (cart.length === 0) {
    container.innerHTML = `
      <div class="empty-cart">
        <div class="ec-icon">🛒</div>
        <h3>Your cart is empty</h3>
        <p>Looks like you haven't added anything yet. Start shopping!</p>
        <a href="../index.html" class="btn btn-primary btn-lg">Browse Products</a>
      </div>`;
    return;
  }

  const shipping = getShippingCost();
  const subtotal = getCartTotal();
  const total = subtotal + shipping;

  container.innerHTML = `
  <div class="cart-layout">
    <div>
      <div class="cart-card">
        <div class="cart-header">
          <h2>Cart (${cart.length} item${cart.length>1?'s':''})</h2>
          <button class="btn btn-ghost btn-sm" id="clear-cart">🗑️ Clear All</button>
        </div>
        ${cart.map(item => `
          <div class="cart-item" data-id="${item.id}">
            <div class="cart-item-img">
              <img src="${item.image||'https://via.placeholder.com/80'}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/80/252535/F5A623?text=P'">
            </div>
            <div class="cart-item-info">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-seller">by ${item.seller || 'ShopMKT Seller'}</div>
              <div class="cart-item-row">
                <span class="cart-item-price">${formatPrice(item.price)}</span>
                <div style="display:flex;align-items:center;gap:10px">
                  <div class="qty-control">
                    <button class="qty-btn qty-minus">−</button>
                    <span class="qty-num">${item.qty}</span>
                    <button class="qty-btn qty-plus">+</button>
                  </div>
                  <button class="cart-item-remove">🗑️</button>
                </div>
              </div>
              <div style="font-size:0.8rem;color:var(--text-dim);margin-top:6px">
                Subtotal: <strong style="color:var(--primary)">${formatPrice(item.price * item.qty)}</strong>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div>
      <div class="summary-card">
        <div class="summary-title">Order Summary</div>

        <div class="zone-select">
          <label class="form-label">Delivery Zone</label>
          <select class="form-input" id="zone-select">
            <option value="0">Select your zone…</option>
            <option value="1500">Lagos & Abuja (₦1,500)</option>
            <option value="2500">South-West (₦2,500)</option>
            <option value="3500">South-East & South-South (₦3,500)</option>
            <option value="4500">North (₦4,500)</option>
          </select>
        </div>

        <div class="promo-row">
          <input type="text" class="form-input" id="promo-input" placeholder="Promo code">
          <button class="btn btn-ghost btn-sm" id="apply-promo">Apply</button>
        </div>

        <div class="summary-row"><span>Subtotal (${cart.reduce((s,i)=>s+i.qty,0)} items)</span><span>${formatPrice(subtotal)}</span></div>
        <div class="summary-row" id="shipping-row"><span>Shipping</span><span id="shipping-val">${shipping > 0 ? formatPrice(shipping) : 'Select zone'}</span></div>
        <div class="summary-row"><span>Discount</span><span id="discount-val">₦0</span></div>
        <div class="summary-row total"><span>Total</span><span id="total-val">${formatPrice(total)}</span></div>

        <a href="checkout.html" class="btn btn-primary btn-full btn-lg" style="margin-top:20px;text-decoration:none;display:flex;justify-content:center">
          Proceed to Checkout →
        </a>
        <a href="../index.html" class="btn btn-ghost btn-full btn-sm" style="margin-top:8px;text-decoration:none;display:flex;justify-content:center">
          ← Continue Shopping
        </a>

        <div class="trust-mini">
          <div class="trust-mini-item">🔒 Secure Checkout</div>
          <div class="trust-mini-item">↩️ Easy Returns</div>
          <div class="trust-mini-item">🚚 Fast Delivery</div>
        </div>
      </div>
    </div>
  </div>`;

  // Events
  document.getElementById('clear-cart').addEventListener('click', () => {
    if (confirm('Clear all items from cart?')) { clearCart(); renderCart(); }
  });

  document.querySelectorAll('.cart-item-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.closest('.cart-item').dataset.id;
      removeFromCart(id); renderCart();
    });
  });

  document.querySelectorAll('.qty-minus').forEach(btn => {
    btn.addEventListener('click', () => {
      const card = btn.closest('.cart-item');
      const id = card.dataset.id;
      const num = parseInt(card.querySelector('.qty-num').textContent);
      if (num <= 1) { removeFromCart(id); } else { updateCartQty(id, num - 1); }
      renderCart();
    });
  });

  document.querySelectorAll('.qty-plus').forEach(btn => {
    btn.addEventListener('click', () => {
      const card = btn.closest('.cart-item');
      const id = card.dataset.id;
      const num = parseInt(card.querySelector('.qty-num').textContent);
      updateCartQty(id, num + 1); renderCart();
    });
  });

  document.getElementById('zone-select').addEventListener('change', () => {
    const val = parseInt(document.getElementById('zone-select').value);
    const subtotal = getCartTotal();
    document.getElementById('shipping-val').textContent = val > 0 ? formatPrice(val) : 'Select zone';
    document.getElementById('total-val').textContent = formatPrice(subtotal + val);
    localStorage.setItem('shopmkt_shipping', val);
  });

  document.getElementById('apply-promo').addEventListener('click', () => {
    const code = document.getElementById('promo-input').value.trim().toUpperCase();
    if (code === 'SHOP10') {
      const disc = Math.round(getCartTotal() * 0.1);
      document.getElementById('discount-val').textContent = '-' + formatPrice(disc);
      toast('Promo Applied! 🎉', '10% discount applied.', 'success');
    } else {
      toast('Invalid Code', 'That promo code is not valid.', 'error');
    }
  });

  // Restore zone
  const savedZone = localStorage.getItem('shopmkt_shipping');
  if (savedZone) {
    const sel = document.getElementById('zone-select');
    sel.value = savedZone;
    sel.dispatchEvent(new Event('change'));
  }
}

function getShippingCost() {
  return parseInt(localStorage.getItem('shopmkt_shipping') || '0');
}

function buildSimpleFooter() {
  return `<footer style="background:var(--dark-2);border-top:1px solid var(--border);padding:30px;text-align:center;color:var(--text-dim);font-size:0.8rem">
    © 2025 ShopMKT. All rights reserved.
  </footer>`;
}

renderCart();
document.addEventListener('cart-updated', renderCart);
</script>

<style>
.trust-mini {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  justify-content: center;
}
.trust-mini-item {
  font-size: 0.72rem;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 4px;
}
</style>
</body>
</html>
