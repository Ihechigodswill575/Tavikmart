<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — TAVIKMART</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-body">

<div class="auth-bg">
  <div class="auth-blob b1"></div>
  <div class="auth-blob b2"></div>
  <div class="auth-grid"></div>
</div>

<header class="auth-header">
  <a href="../index.html" class="navbar-logo">TAVIK<span>MART</span></a>
  <a href="register.html" class="btn btn-ghost btn-sm">New here? Register →</a>
</header>

<main class="auth-main page-enter">
  <div class="auth-card">
    <div class="auth-card-top">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to your TAVIKMART account</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="email">📧 Email</button>
      <button class="auth-tab" data-tab="phone">📱 Phone</button>
    </div>

    <div id="email-tab" class="tab-panel">
      <form id="login-form" novalidate style="display:flex;flex-direction:column;gap:16px">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input type="email" class="form-input" id="email" placeholder="you@example.com" required autocomplete="email">
            <span class="input-check">✅</span>
          </div>
          <div class="form-error hidden" id="email-err">⚠️ Please enter a valid email</div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" class="form-input" id="password" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="eye-toggle" id="eye-toggle">👁️</button>
          </div>
          <div class="form-error hidden" id="pass-err">⚠️ Password must be at least 6 characters</div>
        </div>

        <div class="auth-row">
          <label class="remember-check"><input type="checkbox" id="remember"> Remember me</label>
          <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
          <span class="btn-text">Sign In</span>
        </button>
      </form>
    </div>

    <div id="phone-tab" class="tab-panel hidden">
      <div class="coming-soon-box">
        <div style="font-size:3rem;margin-bottom:12px">📱</div>
        <p>Phone OTP login coming soon!</p>
        <p class="text-muted text-sm mt-4">Use email login for now.</p>
      </div>
    </div>

    <div class="auth-divider"><span>or continue with</span></div>
    <div class="social-auth-row">
      <button class="social-auth-btn" id="google-btn">
        <svg viewBox="0 0 24 24" width="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </button>
    </div>

    <p class="auth-switch">Don't have an account? <a href="register.html">Create one</a></p>
    <div id="auth-error" class="auth-error hidden"></div>
  </div>
</main>

<div id="toast-container"></div>

<script type="module">
import { loginUser, toast, btnLoading } from '../js/app.js';
import { auth, db } from '../js/firebase-config.js';
import { GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Tab switching
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab + '-tab').classList.remove('hidden');
  });
});

// Password eye toggle
const eyeBtn = document.getElementById('eye-toggle');
const passInput = document.getElementById('password');
eyeBtn.addEventListener('click', () => {
  const show = passInput.type === 'password';
  passInput.type = show ? 'text' : 'password';
  eyeBtn.textContent = show ? '🙈' : '👁️';
});

// Validation helpers
function validateEmail(v) {
  const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  document.getElementById('email').classList.toggle('error', !ok && v.length > 0);
  document.getElementById('email').classList.toggle('success', ok);
  document.getElementById('email-err').classList.toggle('hidden', ok || v.length === 0);
  return ok;
}
function validatePass(v) {
  const ok = v.length >= 6;
  document.getElementById('password').classList.toggle('error', !ok && v.length > 0);
  document.getElementById('pass-err').classList.toggle('hidden', ok || v.length === 0);
  return ok;
}

document.getElementById('email').addEventListener('input', e => validateEmail(e.target.value));
document.getElementById('password').addEventListener('input', e => validatePass(e.target.value));

// Login
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');

  if (!validateEmail(email) || !validatePass(password)) {
    toast('Validation Error', 'Please fix the errors above.', 'error');
    return;
  }

  btnLoading(btn, true);
  const errEl = document.getElementById('auth-error');
  errEl.classList.add('hidden');

  try {
    const user = await loginUser({ email, password });
    toast('Welcome back! 🎉', 'Redirecting…', 'success');

    // Redirect based on role
    const snap = await getDoc(doc(db, 'users', user.uid));
    const role = snap.exists() ? snap.data().role : 'buyer';

    setTimeout(() => {
      if (role === 'admin') window.location.href = 'admin.html';
      else if (role === 'seller') window.location.href = 'seller-dashboard.html';
      else window.location.href = '../index.html';
    }, 1200);
  } catch (err) {
    btnLoading(btn, false);
    const msgs = {
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password. Try again.',
      'auth/too-many-requests': 'Too many attempts. Please wait a moment.',
      'auth/invalid-credential': 'Invalid email or password.',
    };
    const msg = msgs[err.code] || err.message;
    errEl.textContent = '⚠️ ' + msg;
    errEl.classList.remove('hidden');
    document.getElementById('password').classList.add('error');
    toast('Login Failed', msg, 'error');
  }
});

// Google sign-in
document.getElementById('google-btn').addEventListener('click', async () => {
  const provider = new GoogleAuthProvider();
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) {
      await setDoc(doc(db, 'users', user.uid), {
        uid: user.uid, email: user.email, name: user.displayName,
        role: 'buyer', status: 'active', createdAt: serverTimestamp(),
      });
    }
    toast('Signed in with Google! 🎉', '', 'success');
    const role = snap.exists() ? snap.data().role : 'buyer';
    setTimeout(() => {
      if (role === 'admin') window.location.href = 'admin.html';
      else if (role === 'seller') window.location.href = 'seller-dashboard.html';
      else window.location.href = '../index.html';
    }, 1200);
  } catch (err) {
    toast('Google Sign-In Failed', err.message, 'error');
  }
});
</script>
</body>
</html>
