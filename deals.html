<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Deals — ShopMKT</title>
  <link rel="stylesheet" href="../css/global.css">
</head>
<body>
<div id="nav-root"></div>

<div class="container" style="margin:40px auto 80px">
  <!-- Banner -->
  <div style="background:linear-gradient(135deg,rgba(232,69,69,0.15),rgba(245,166,35,0.1));border:1px solid rgba(232,69,69,0.2);border-radius:var(--radius-lg);padding:40px;text-align:center;margin-bottom:40px;position:relative;overflow:hidden">
    <div style="position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(245,166,35,0.08),transparent 70%);pointer-events:none"></div>
    <div style="font-size:2.5rem;margin-bottom:10px">⚡</div>
    <h1 style="font-size:2rem;margin-bottom:8px">Flash Deals</h1>
    <p style="color:var(--text-muted);margin-bottom:16px">Limited time offers. Grab them before they're gone!</p>
    <div id="countdown-wrap" style="display:inline-flex;align-items:center;gap:12px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 24px">
      <span style="font-size:0.875rem;color:var(--text-muted)">Ends in:</span>
      <div id="cd-wrap" style="display:flex;gap:8px">
        <div class="cd-block"><span id="cd-h">00</span><div class="cd-label">hrs</div></div>
        <div style="font-size:1.5rem;font-weight:800;color:var(--primary);align-self:flex-start;margin-top:2px">:</div>
        <div class="cd-block"><span id="cd-m">00</span><div class="cd-label">min</div></div>
        <div style="font-size:1.5rem;font-weight:800;color:var(--primary);align-self:flex-start;margin-top:2px">:</div>
        <div class="cd-block"><span id="cd-s">00</span><div class="cd-label">sec</div></div>
      </div>
    </div>
  </div>

  <div class="grid-4" id="deals-grid">
    <!-- loaded by JS -->
  </div>
</div>

<div id="toast-container"></div>

<style>
.cd-block { text-align: center; }
.cd-block span { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--primary); }
.cd-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
</style>

<script type="module">
import { buildNavbar, getProducts, addToCart, cartFlyAnimation, formatPrice, toast, updateNavUI, updateCartBadge } from '../js/app.js';

document.getElementById('nav-root').innerHTML = buildNavbar();
updateNavUI(); updateCartBadge();

// Countdown
function startCountdown() {
  const end = new Date(); end.setHours(23,59,59,999);
  function tick() {
    const diff = Math.max(0, end - new Date());
    document.getElementById('cd-h').textContent = String(Math.floor(diff/3600000)).padStart(2,'0');
    document.getElementById('cd-m').textContent = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    document.getElementById('cd-s').textContent = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
  }
  tick(); setInterval(tick, 1000);
}

const DEALS = [
  { id:'d1', name:'iPhone 15 Pro Max 256GB', price:850000, oldPrice:950000, seller:'TechHub NG', image:'https://images.unsplash.com/photo-1695048133142-1a20484d2569?w=400&q=80' },
  { id:'d2', name:'Air Max 270 Sneakers', price:45000, oldPrice:60000, seller:'KickZone', image:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&q=80' },
  { id:'d5', name:'Smart Watch Pro', price:65000, oldPrice:80000, seller:'TechHub NG', image:'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&q=80' },
  { id:'d7', name:'JBL Flip 6 Speaker', price:35000, oldPrice:42000, seller:'SoundCity', image:'https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=400&q=80' },
  { id:'d3', name:'Dell XPS 15 Laptop', price:750000, oldPrice:900000, seller:'GadgetWorld', image:'https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=400&q=80' },
  { id:'d4', name:'Luxury Perfume Set', price:28000, oldPrice:38000, seller:'GlowStore', image:'https://images.unsplash.com/photo-1541643600914-78b084683702?w=400&q=80' },
  { id:'d6', name:"Women's Ankara Dress", price:15000, oldPrice:22000, seller:'AfroStyle', image:'https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=400&q=80' },
  { id:'d8', name:'Indoor Plant Set (3)', price:8500, oldPrice:12000, seller:'GreenThumb', image:'https://images.unsplash.com/photo-1545241047-6083a3684587?w=400&q=80' },
];

async function load() {
  let products = DEALS;
  try {
    const db_prods = await getProducts({ limit: 20 });
    if (db_prods.length > 0) products = db_prods;
  } catch(e) {}

  const grid = document.getElementById('deals-grid');
  grid.innerHTML = products.map(p => {
    const disc = p.oldPrice ? Math.round((1-p.price/p.oldPrice)*100) : 0;
    return `
    <div class="product-card" data-id="${p.id}">
      <div class="product-card-img">
        <div class="product-badge sale">-${disc}%</div>
        <img src="${p.image||''}" alt="${p.name}" loading="lazy">
        <div class="product-card-actions">
          <button class="btn btn-primary btn-sm atc-btn" style="flex:1" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}" data-image="${p.image||''}" data-seller="${p.seller||''}">🛒 Add to Cart</button>
          <a href="product.html?id=${p.id}" class="btn btn-ghost btn-sm">👁️</a>
        </div>
      </div>
      <div class="product-card-info">
        <a href="product.html?id=${p.id}" class="product-name">${p.name}</a>
        <div class="product-seller">by ${p.seller||'Verified Seller'}</div>
        <div class="product-price">
          <span class="product-price-main">${formatPrice(p.price)}</span>
          ${p.oldPrice ? `<span class="product-price-old">${formatPrice(p.oldPrice)}</span>` : ''}
        </div>
        <div style="margin-top:8px">
          <div style="background:var(--surface-3);border-radius:4px;height:5px;overflow:hidden">
            <div style="height:100%;background:var(--accent);width:${Math.random()*60+30}%;border-radius:4px"></div>
          </div>
          <div style="font-size:0.72rem;color:var(--text-dim);margin-top:4px">🔥 ${Math.floor(Math.random()*40+5)} sold today</div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.atc-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      const product = { id: btn.dataset.id, name: btn.dataset.name, price: parseFloat(btn.dataset.price), image: btn.dataset.image, seller: btn.dataset.seller };
      addToCart(product);
      toast('Added to Cart! 🛒', product.name, 'success');
      const img = btn.closest('.product-card').querySelector('img');
      cartFlyAnimation(img, document.getElementById('cart-badge'));
      updateCartBadge();
    });
  });
}

startCountdown();
load();
</script>
</body>
</html>
