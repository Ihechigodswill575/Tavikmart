<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — ShopMKT</title>
  <link rel="stylesheet" href="../css/global.css">
  <style>
    .order-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; transition: var(--transition); }
    .order-card:hover { border-color: var(--border-accent); }
    .order-header { padding: 16px 22px; background: var(--surface-2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .order-id { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--primary); }
    .order-body { padding: 18px 22px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .order-imgs { display: flex; gap: 8px; }
    .order-img { width: 56px; height: 56px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); background: var(--surface-3); flex-shrink: 0; }
    .order-img img { width: 100%; height: 100%; object-fit: cover; }
    .order-img-more { width: 56px; height: 56px; border-radius: 8px; background: var(--surface-3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); }
    .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
    .status-pending { background: rgba(243,156,18,0.12); color: var(--warning); }
    .status-processing { background: rgba(52,152,219,0.12); color: #3498DB; }
    .status-delivered { background: rgba(46,204,113,0.12); color: var(--success); }
    .status-cancelled { background: rgba(231,76,60,0.12); color: var(--danger); }
    .status-shipped { background: rgba(155,89,182,0.12); color: #9B59B6; }
    .status-ready { background: rgba(245,166,35,0.12); color: var(--primary); }
  </style>
</head>
<body>
<div id="nav-root"></div>

<div class="container" style="margin:40px auto 80px;max-width:820px">
  <div class="section-header">
    <h1 class="section-title">📦 My Orders</h1>
    <select class="form-input" id="status-filter" style="max-width:180px;padding:8px 12px">
      <option value="">All Orders</option>
      <option value="pending">Pending</option>
      <option value="processing">Processing</option>
      <option value="shipped">Shipped</option>
      <option value="delivered">Delivered</option>
      <option value="cancelled">Cancelled</option>
    </select>
  </div>

  <div id="orders-container">
    <p style="color:var(--text-muted);text-align:center;padding:40px">Loading your orders…</p>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { buildNavbar, getOrders, state, formatPrice, formatDate, formatStatus, updateNavUI, updateCartBadge } from '../js/app.js';

document.getElementById('nav-root').innerHTML = buildNavbar();
updateNavUI(); updateCartBadge();

let allOrders = [];

document.addEventListener('auth-changed', async (e) => {
  const { user } = e.detail;
  if (!user) { window.location.href = 'login.html'; return; }
  try {
    allOrders = await getOrders(user.uid, 'buyer');
    renderOrders(allOrders);
  } catch(err) {
    renderOrders([]);
  }
});

function renderOrders(orders) {
  const el = document.getElementById('orders-container');
  if (!orders.length) {
    el.innerHTML = `<div style="text-align:center;padding:80px 24px">
      <div style="font-size:3.5rem;margin-bottom:14px">📦</div>
      <h3 style="margin-bottom:8px">No orders found</h3>
      <p style="color:var(--text-muted);margin-bottom:24px">You haven't placed any orders yet.</p>
      <a href="../index.html" class="btn btn-primary">Start Shopping</a>
    </div>`;
    return;
  }

  el.innerHTML = orders.map(o => {
    const [icon, label] = formatStatus(o.status);
    const items = o.items || [];
    const preview = items.slice(0, 3);
    const extra = items.length - 3;
    return `
    <div class="order-card">
      <div class="order-header">
        <div>
          <div class="order-id">${o.orderId}</div>
          <div style="font-size:0.78rem;color:var(--text-dim);margin-top:2px">Placed on ${formatDate(o.createdAt)}</div>
        </div>
        <span class="status-badge status-${o.status}">${icon} ${label}</span>
      </div>
      <div class="order-body">
        <div class="order-imgs">
          ${preview.map(i => `<div class="order-img"><img src="${i.image||''}" alt="${i.name}" onerror="this.src='https://via.placeholder.com/56/252535/F5A623?text=P'"></div>`).join('')}
          ${extra > 0 ? `<div class="order-img-more">+${extra}</div>` : ''}
          <div style="margin-left:4px">
            <div style="font-size:0.875rem;font-weight:500">${items.length} item${items.length!==1?'s':''}</div>
            <div style="font-size:0.78rem;color:var(--text-muted)">${o.paymentMethod === 'paystack' ? '💳 Paid Online' : '💵 Cash on Delivery'}</div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--primary)">${formatPrice(o.total || 0)}</div>
          <div style="display:flex;gap:8px;margin-top:8px;justify-content:flex-end">
            <a href="order-confirm.html?id=${o.orderId}" class="btn btn-ghost btn-sm">View Details</a>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('status-filter').addEventListener('change', e => {
  const val = e.target.value;
  renderOrders(val ? allOrders.filter(o => o.status === val) : allOrders);
});
</script>
</body>
</html>
